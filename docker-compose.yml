services:
  outstasher:
    build: .
    image: outstasher:latest
    container_name: outstasher
    restart: unless-stopped
    ports:
      - "8008:8008"
    env_file:
      - .env
    # Se o qBittorrent/Jackett rodam na SUA maquina (host), use
    # host.docker.internal nas URLs do .env em vez de localhost. Esta linha faz
    # isso funcionar tambem no Linux (no Docker Desktop ja funciona sem ela).
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # --- Aceleracao por HARDWARE Intel (Quick Sync / QSV — GPU Arc) ---
    # Expoe a GPU ao container. So faz sentido em Linux com uma GPU Intel; sem
    # ela, remova este bloco (a deteccao em runtime testa a GPU de verdade e
    # simplesmente nao oferece o QSV se ele nao abrir).
    #   - /dev/dri: o device de render/encode (renderD128) + card0.
    #   - group_add: o container precisa pertencer ao grupo dono do renderD128
    #     para ter permissao de acesso. Descubra o GID no host com:
    #         getent group render        # ex.: render:x:992:  -> use 992
    #     e ponha o NUMERO abaixo (nomes de grupo nao existem dentro do container).
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "992"   # GID do grupo 'render' no host (ajuste se o seu for diferente)
    volumes:
      # jobs.db (SQLite) persiste fora do container
      - downloader-data:/data
      # Pastas de downloads e destino final: monte aqui os MESMOS caminhos que
      # voce cadastra na UI (Configuracoes). O caminho DENTRO do container tem
      # que bater com o "caminho local" do destino de torrents e com o path dos
      # destinos do arquivo final. Ajuste a origem (esquerda) para a sua maquina.
      #
      #   <caminho no host>:<caminho dentro do container>
      - ${DOWNLOADS_DIR:-./downloads}:/downloads
      - ${OUTPUT_DIR_HOST:-./output}:/output

volumes:
  downloader-data:
